<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Now Playing Overlay</title>
<link id="gfont" rel="stylesheet" href="">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:transparent;width:100%;height:100%;overflow:hidden;
  font-family:var(--font,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif);
  -webkit-font-smoothing:antialiased;}

/* ── Background layers ── */
.bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0;}
#bg-gradient{display:none;opacity:0.22;
  background:linear-gradient(-45deg,var(--ambient-solid,#1db954),#050508,var(--ambient-solid,#0d5c2e),#000);
  background-size:400% 400%;animation:bgShift 20s ease infinite;}
@keyframes bgShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
#bg-bokeh{display:none;}
#bg-grain{display:none;opacity:0.07;}
#confetti-canvas{z-index:10;pointer-events:none;}

/* ── Root / position presets ── */
#root{position:relative;display:flex;width:100%;height:100%;padding:16px;z-index:1;}
#root.pos-top-left    {justify-content:flex-start;align-items:flex-start;}
#root.pos-top-center  {justify-content:center;    align-items:flex-start;}
#root.pos-top-right   {justify-content:flex-end;  align-items:flex-start;}
#root.pos-center-left {justify-content:flex-start;align-items:center;}
#root.pos-center      {justify-content:center;    align-items:center;}
#root.pos-center-right{justify-content:flex-end;  align-items:center;}
#root.pos-bottom-left {justify-content:flex-start;align-items:flex-end;}
#root.pos-bottom-center{justify-content:center;   align-items:flex-end;}
#root.pos-bottom-right{justify-content:flex-end;  align-items:flex-end;}
#root.pos-custom{padding:0;}
#root.pos-custom #card{position:absolute;left:var(--cx,16px);top:var(--cy,16px);}

/* ── Card ── */
#card{
  display:flex;gap:16px;padding:16px;
  border-radius:16px;
  position:relative;
  backdrop-filter:blur(var(--blur,12px));
  -webkit-backdrop-filter:blur(var(--blur,12px));
  background:var(--bg-color,rgba(10,10,15,0.85));
  max-width:720px;width:100%;
  opacity:1;
  transition:opacity 0.4s ease,transform 0.4s ease,filter 0.35s ease;
  will-change:opacity,transform;
  transform:translateZ(0);
}
#card.card-hidden{opacity:0;pointer-events:none;}

/* Card styles */
body.card-ghost #card{background:transparent!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;box-shadow:none;border:none;}
body.card-outlined #card{background:rgba(255,255,255,0.04)!important;backdrop-filter:blur(10px)!important;-webkit-backdrop-filter:blur(10px)!important;border:1px solid rgba(255,255,255,0.22);}
body.card-solid #card{backdrop-filter:none!important;-webkit-backdrop-filter:none!important;}

/* ── Text effects ── */
body.text-shadow #track-title span,
body.text-shadow #track-artist span,
body.text-shadow #track-album span{text-shadow:0 2px 14px rgba(0,0,0,0.95),0 1px 4px rgba(0,0,0,0.8);}
body.text-glow #track-title span{text-shadow:0 0 10px var(--title-color,#fff),0 0 28px var(--title-color,#fff),0 0 50px var(--title-color,#fff);}
body.text-glow #track-artist span{text-shadow:0 0 8px var(--artist-color,#b3b3b3),0 0 20px var(--artist-color,#b3b3b3);}
body.text-outline #track-title span,
body.text-outline #track-artist span{-webkit-text-stroke:1px rgba(0,0,0,0.7);paint-order:stroke fill;}

/* ── Art wrap ── */
#art-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;position:relative;gap:8px;}

/* ── Art container ── */
#art-container{position:relative;display:flex;align-items:center;justify-content:center;transition:box-shadow 0.5s ease;}

/* ── Album art ── */
#album-art{object-fit:cover;display:block;transition:border-radius 0.4s ease;}
#album-art.popin{animation:artPop 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;}
@keyframes artPop{from{transform:scale(0.82);opacity:0.3}to{transform:scale(1);opacity:1}}

/* ── Vinyl ── */
body.art-vinyl #art-container{
  border-radius:50%;
  background:
    radial-gradient(circle,transparent 0%,transparent 37%,rgba(255,255,255,0.022) 37.6%,transparent 38.2%),
    radial-gradient(circle,transparent 0%,transparent 42%,rgba(255,255,255,0.02)  42.6%,transparent 43.2%),
    radial-gradient(circle,transparent 0%,transparent 47%,rgba(255,255,255,0.018) 47.6%,transparent 48.2%),
    radial-gradient(circle,transparent 0%,transparent 52%,rgba(255,255,255,0.016) 52.6%,transparent 53.2%),
    radial-gradient(circle,transparent 0%,transparent 57%,rgba(255,255,255,0.014) 57.6%,transparent 58.2%),
    radial-gradient(circle,transparent 0%,transparent 62%,rgba(255,255,255,0.012) 62.6%,transparent 63.2%),
    radial-gradient(circle,transparent 0%,transparent 67%,rgba(255,255,255,0.01)  67.6%,transparent 68.2%),
    radial-gradient(circle,transparent 0%,transparent 72%,rgba(255,255,255,0.008) 72.6%,transparent 73.2%),
    radial-gradient(circle,transparent 0%,transparent 77%,rgba(255,255,255,0.006) 77.6%,transparent 78.2%),
    #0c0c0c;
  box-shadow:0 6px 36px rgba(0,0,0,0.6),inset 0 0 0 1px rgba(255,255,255,0.06);
}
body.art-vinyl #art-container.spinning{animation:vinylSpin 3s linear infinite;}
@keyframes vinylSpin{to{transform:rotate(360deg);}}
body.art-vinyl #album-art{border-radius:50%!important;z-index:1;position:relative;}
#vinyl-hole{display:none;position:absolute;width:9%;height:9%;background:radial-gradient(circle,#1a1a1a 50%,#000 100%);border-radius:50%;z-index:2;box-shadow:0 0 0 1px rgba(255,255,255,0.08);}
body.art-vinyl #vinyl-hole{display:block;}

/* ── Float ── */
@keyframes artFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
body.art-float #art-container{animation:artFloat 3.2s ease-in-out infinite;}

/* ── Glow ── */
@keyframes glowPulse{0%,100%{box-shadow:0 0 18px 4px var(--ambient-color,rgba(29,185,84,0.45));}50%{box-shadow:0 0 38px 10px var(--ambient-color,rgba(29,185,84,0.65));}}
body.art-glow #art-container{animation:glowPulse 2.6s ease-in-out infinite;}

/* ── Ken Burns ── */
@keyframes kenBurns{0%{transform:scale(1) translate(0%,0%)}33%{transform:scale(1.08) translate(-1.5%,0.8%)}66%{transform:scale(1.1) translate(1.5%,-0.8%)}100%{transform:scale(1) translate(0%,0%)}}
body.art-kenburns #art-container{overflow:hidden;}
body.art-kenburns #album-art{animation:kenBurns 20s ease-in-out infinite;transform-origin:center;}

/* ── Reflection ── */
#art-reflection{display:none;position:absolute;left:0;object-fit:cover;transform:scaleY(-1);opacity:0.18;
  -webkit-mask-image:linear-gradient(to bottom,rgba(0,0,0,0.6) 0%,transparent 85%);
  mask-image:linear-gradient(to bottom,rgba(0,0,0,0.6) 0%,transparent 85%);
  filter:blur(2px);pointer-events:none;}
body.art-reflection #art-reflection{display:block;}

/* ── EQ bars base ── */
#eq-wrap{display:none;align-items:flex-end;justify-content:center;gap:3px;height:24px;}
#eq-wrap.eq-on{display:flex;}
#eq-wrap.eq-paused .eq-bar{animation-play-state:paused;}
.eq-bar{width:4px;height:100%;border-radius:2px 2px 0 0;background:var(--progress-color,#1db954);
  transform:scaleY(0.1);transform-origin:bottom;opacity:0.85;
  animation:eqB var(--d,0.6s) ease-in-out var(--dl,0s) infinite alternate;}
@keyframes eqB{from{transform:scaleY(0.1)}to{transform:scaleY(1)}}

/* ── EQ styles ── */
body.eq-led .eq-bar{
  background:repeating-linear-gradient(to top,var(--progress-color,#1db954) 0%,var(--progress-color,#1db954) 72%,transparent 72%,transparent 100%)!important;
  background-size:100% 7px!important;
}
body.eq-mirrored #eq-wrap{align-items:center;}
body.eq-mirrored .eq-bar{transform-origin:center!important;}
body.eq-dots #eq-wrap{align-items:flex-end;height:28px;}
body.eq-dots .eq-bar{width:8px!important;height:8px!important;border-radius:50%!important;transform-origin:center!important;animation-name:eqDot!important;}
@keyframes eqDot{from{transform:translateY(0) scale(0.4)}to{transform:translateY(-18px) scale(1)}}
body.eq-gradient .eq-bar{background:linear-gradient(to top,var(--progress-color,#1db954),var(--ambient-solid,#6ee7a0))!important;}
body.eq-thin .eq-bar{width:2px!important;border-radius:999px!important;gap:5px;}

/* ── EQ placements ── */
/* behind-art: eq-wrap is inside art-container */
body.eq-behind-art #art-container{overflow:hidden;}
body.eq-behind-art #eq-wrap{position:absolute;bottom:0;left:0;right:0;width:100%!important;height:60%;opacity:0.45;z-index:0;pointer-events:none;}
body.eq-behind-art #album-art{position:relative;z-index:1;}
body.eq-behind-art #vinyl-hole{z-index:2;}
/* card-bg / card-fill / bottom: eq-wrap is inside card */
body.eq-card-bg #eq-wrap{position:absolute;bottom:0;left:0;right:0;width:100%!important;height:48px;opacity:0.14;z-index:0;pointer-events:none;}
body.eq-card-fill #eq-wrap{position:absolute;bottom:0;left:0;right:0;width:100%!important;height:100%;opacity:0.07;z-index:0;pointer-events:none;}
body.eq-bottom #card{overflow:hidden;}
body.eq-bottom #eq-wrap{position:absolute;bottom:0;left:0;right:0;width:100%!important;height:34px;opacity:0.78;z-index:2;pointer-events:none;}

/* ── Card glow (border-glow) ── */
@keyframes cardGlow{
  0%,100%{box-shadow:0 0 18px 3px var(--ambient-color,rgba(29,185,84,0.38)),0 4px 20px rgba(0,0,0,0.35);}
  50%    {box-shadow:0 0 32px 8px var(--ambient-color,rgba(29,185,84,0.65)),0 4px 20px rgba(0,0,0,0.35);}
}

/* ── BPM pulse (uses `scale` to avoid transform conflict with transitions) ── */
@keyframes bpmPulse{0%,100%{scale:1}50%{scale:1.018}}

/* ── Info column ── */
#info{display:flex;flex-direction:column;justify-content:center;gap:4px;flex:1;min-width:0;}

/* ── Marquee text ── */
#track-title,#track-artist,#track-album{overflow:hidden;white-space:nowrap;}
#track-title  span,#track-artist span,#track-album  span{display:inline-block;white-space:nowrap;}
@keyframes mqScroll{
  0%,8%  {transform:translateX(0);}
  80%,88%{transform:translateX(var(--mq-d,0));}
  100%   {transform:translateX(0);}
}

#track-title {font-weight:700;letter-spacing:-0.2px;line-height:1.2;}
#track-artist{font-weight:400;opacity:0.85;}
#track-album {font-weight:400;opacity:0.6;}

/* ── Progress bar ── */
#progress-wrap{margin-top:6px;height:3px;border-radius:999px;background:rgba(255,255,255,0.12);position:relative;}
#progress-fill{height:100%;border-radius:999px;background:var(--progress-color,#1db954);transition:width 1s linear;position:relative;overflow:hidden;}
@keyframes shimmer{0%{transform:translateX(-150%)}100%{transform:translateX(300%)}}
body.progress-shimmer #progress-fill::after{content:'';position:absolute;inset:0;width:40%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.55),transparent);animation:shimmer 2.2s ease-in-out infinite;}
#progress-tip{display:none;position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;background:var(--progress-color,#1db954);box-shadow:0 0 8px 3px var(--progress-color,#1db954);z-index:2;}
body.progress-glow #progress-tip{display:block;}
body.progress-glow #progress-fill{overflow:visible;}
@keyframes gradFill{0%{background-position:0% 0%}100%{background-position:200% 0%}}
body.progress-gradient #progress-fill{background:linear-gradient(90deg,var(--progress-color,#1db954),var(--ambient-solid,#6ee7a0),var(--progress-color,#1db954));background-size:200% 100%;animation:gradFill 3s linear infinite;}

/* ── Time remaining ── */
#time-display{font-size:10.5px;color:rgba(255,255,255,0.4);text-align:right;margin-top:3px;font-variant-numeric:tabular-nums;display:none;}

/* ── Controls ── */
#controls-wrap{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:8px;}
.ctrl-btn{background:none;border:none;padding:0;cursor:default;display:flex;align-items:center;justify-content:center;opacity:0.85;flex-shrink:0;}
.ctrl-btn svg{display:block;fill:var(--ctrl-color,#fff);transition:fill 0.2s;}

/* ── Lyrics ── */
#lyrics-wrap{margin-top:10px;overflow:hidden;position:relative;}
#lyrics-inner{display:flex;flex-direction:column;transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);will-change:transform;}
.lyric-line{white-space:normal;word-break:break-word;transition:opacity 0.3s ease,font-size 0.3s ease,color 0.3s ease,transform 0.3s ease;transform-origin:left center;}
.lyric-line.active{transform:scale(1.04);}
@keyframes charWave{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
body.lyrics-wave .lyric-line.active .lc{display:inline-block;animation:charWave 0.7s ease-in-out infinite;}

/* ── Split layout ── */
body.layout-split #card{flex-direction:row;align-items:stretch;padding:0;gap:0;overflow:hidden;}
body.layout-split #art-wrap{flex-direction:column;width:140px;flex-shrink:0;padding:0;gap:0;align-items:unset;overflow:hidden;}
body.layout-split #art-container{flex:1;width:100%!important;height:auto;overflow:hidden;}
body.layout-split #album-art{width:100%!important;height:100%!important;object-fit:cover!important;border-radius:0!important;max-width:none;}
body.layout-split #art-reflection{display:none!important;}
body.layout-split #eq-wrap{width:100%!important;}
body.layout-split #info{padding:14px;flex:1;justify-content:flex-start;}
body.layout-split #lyrics-wrap{flex:1;height:auto!important;}

/* ── Vertical layout ── */
body.layout-vertical #card{flex-direction:column;align-items:flex-start;}
body.layout-vertical #art-wrap{width:100%;flex-direction:row;align-items:flex-end;}

/* ── Idle screen ── */
#idle-screen{display:none;position:fixed;inset:0;z-index:5;pointer-events:none;align-items:center;justify-content:center;}
#idle-screen.idle-show{display:flex;}
.idle-pulse{display:flex;align-items:center;justify-content:center;width:80px;height:80px;border-radius:50%;
  background:rgba(29,185,84,0.1);border:1.5px solid rgba(29,185,84,0.28);
  font-size:30px;color:rgba(255,255,255,0.65);animation:idlePulse 2.2s ease-in-out infinite;}
@keyframes idlePulse{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.18);opacity:0.9}}
.idle-notes{position:relative;width:100%;height:100%;}
.idle-note{position:absolute;font-size:22px;opacity:0;animation:idleNoteFloat 3s ease-in-out infinite;}
@keyframes idleNoteFloat{0%{opacity:0;transform:translateY(0)}15%{opacity:0.75}85%{opacity:0.4}100%{opacity:0;transform:translateY(-70px)}}
.idle-wave{display:flex;align-items:flex-end;gap:5px;}
.idle-wave-bar{width:4px;background:var(--progress-color,rgba(29,185,84,0.5));border-radius:999px;animation:idleWave 1s ease-in-out infinite alternate;}
@keyframes idleWave{from{transform:scaleY(0.15)}to{transform:scaleY(1)}}
.idle-disc{width:72px;height:72px;border-radius:50%;
  background:radial-gradient(circle,#1a1a1a 28%,rgba(29,185,84,0.25) 28%,rgba(29,185,84,0.12) 50%,#111 50%);
  border:2px solid rgba(29,185,84,0.3);animation:idleDisc 3s linear infinite;}
@keyframes idleDisc{to{transform:rotate(360deg)}}
</style>
</head>
<body class="layout-horizontal pos-top-left">

<div id="bg-gradient" class="bg-layer"></div>
<canvas id="bg-bokeh" class="bg-layer"></canvas>
<svg id="bg-grain" class="bg-layer" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <filter id="gf"><feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch">
    <animate attributeName="seed" from="0" to="200" dur="0.45s" repeatCount="indefinite"/>
  </feTurbulence><feColorMatrix type="saturate" values="0"/></filter>
  <rect width="100%" height="100%" filter="url(#gf)"/>
</svg>
<canvas id="confetti-canvas" class="bg-layer"></canvas>

<div id="root" class="pos-top-left">
  <div id="card">
    <div id="art-wrap">
      <div id="art-container">
        <img id="album-art" src="" alt="" width="120" height="120" style="border-radius:12px"/>
        <div id="vinyl-hole"></div>
      </div>
      <img id="art-reflection" src="" alt="" width="120" height="120" style="border-radius:12px"/>
      <div id="eq-wrap"></div>
    </div>
    <div id="info">
      <div id="track-title"  style="font-size:22px;color:#fff;"><span></span></div>
      <div id="track-artist" style="font-size:15px;color:#b3b3b3;"><span></span></div>
      <div id="track-album"  style="font-size:13px;color:#888;"><span></span></div>
      <div id="progress-wrap">
        <div id="progress-fill" style="width:0%"><div id="progress-tip"></div></div>
      </div>
      <div id="time-display"></div>
      <div id="controls-wrap">
        <button class="ctrl-btn" id="ctrl-prev">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn" id="ctrl-playpause">
          <svg id="ctrl-play-svg"  viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="ctrl-pause-svg" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl-btn" id="ctrl-next">
          <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>
      <div id="lyrics-wrap"><div id="lyrics-inner"></div></div>
    </div>
  </div>
</div>

<div id="idle-screen"><div id="idle-inner"></div></div>

<script>
const FONTS = {
  "Default":          {family:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",url:""},
  "Inter":            {family:"'Inter',sans-serif",           url:"https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"},
  "Poppins":          {family:"'Poppins',sans-serif",         url:"https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"},
  "Montserrat":       {family:"'Montserrat',sans-serif",      url:"https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"},
  "Nunito":           {family:"'Nunito',sans-serif",          url:"https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap"},
  "Raleway":          {family:"'Raleway',sans-serif",         url:"https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap"},
  "Oswald":           {family:"'Oswald',sans-serif",          url:"https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap"},
  "Playfair Display": {family:"'Playfair Display',serif",     url:"https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap"},
  "Space Grotesk":    {family:"'Space Grotesk',sans-serif",   url:"https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap"},
  "DM Sans":          {family:"'DM Sans',sans-serif",         url:"https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap"},
};
function applyFont(name){const f=FONTS[name]||FONTS["Default"];document.getElementById("gfont").href=f.url;document.documentElement.style.setProperty("--font",f.family);}

const overlayProfile=Math.min(3,Math.max(1,parseInt(window.location.pathname.split('/').pop())||1));

// ── State ──────────────────────────────────────────────────────
let settings={};
let currentTrackId=null;
let lyrics={synced:false,lines:[]};
let currentLyricIndex=-1;
let lyricsLineHeight=0;
let progressMs=0,lastPollTime=0,isPlaying=false;
let ambientRgb={r:29,g:185,b:84};
let cardAnimBorderGlow=false, cardAnimBpmPulse=false;
let lastEqStyle='', lastEqPlacement='';

// ── DOM refs ───────────────────────────────────────────────────
const root          = document.getElementById("root");
const card          = document.getElementById("card");
const artWrap       = document.getElementById("art-wrap");
const artContainer  = document.getElementById("art-container");
const albumArt      = document.getElementById("album-art");
const artReflection = document.getElementById("art-reflection");
const eqWrap        = document.getElementById("eq-wrap");
const titleEl       = document.getElementById("track-title");
const artistEl      = document.getElementById("track-artist");
const albumEl       = document.getElementById("track-album");
const titleSpan     = titleEl.querySelector("span");
const artistSpan    = artistEl.querySelector("span");
const albumSpan     = albumEl.querySelector("span");
const progWrap      = document.getElementById("progress-wrap");
const progFill      = document.getElementById("progress-fill");
const timeDisplay   = document.getElementById("time-display");
const lyricsWrap    = document.getElementById("lyrics-wrap");
const lyricsInner   = document.getElementById("lyrics-inner");
const idleScreen    = document.getElementById("idle-screen");
const idleInner     = document.getElementById("idle-inner");

// ── Color extraction ───────────────────────────────────────────
const _cc=document.createElement('canvas'),_cx=_cc.getContext('2d');
function extractColor(img){
  try{
    _cc.width=24;_cc.height=24;_cx.drawImage(img,0,0,24,24);
    const d=_cx.getImageData(0,0,24,24).data;
    let r=0,g=0,b=0,n=0;
    for(let i=0;i<d.length;i+=16){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}
    r=Math.min(255,Math.round((r/n)*1.25));g=Math.min(255,Math.round((g/n)*1.25));b=Math.min(255,Math.round((b/n)*1.25));
    ambientRgb={r,g,b};
    document.documentElement.style.setProperty('--ambient-color',`rgba(${r},${g},${b},0.5)`);
    document.documentElement.style.setProperty('--ambient-solid',`rgb(${r},${g},${b})`);
    // Auto-color: tint text and accent from album art
    if(settings.animations?.autoColor){
      const lr=Math.min(255,Math.round(r+(255-r)*0.68));
      const lg=Math.min(255,Math.round(g+(255-g)*0.68));
      const lb=Math.min(255,Math.round(b+(255-b)*0.68));
      const ar=Math.min(255,Math.round(r+(255-r)*0.38));
      const ag=Math.min(255,Math.round(g+(255-g)*0.38));
      const ab=Math.min(255,Math.round(b+(255-b)*0.38));
      document.documentElement.style.setProperty('--title-color',`rgb(${lr},${lg},${lb})`);
      document.documentElement.style.setProperty('--artist-color',`rgb(${ar},${ag},${ab})`);
      document.documentElement.style.setProperty('--progress-color',`rgb(${r},${g},${b})`);
      titleEl.style.color=`rgb(${lr},${lg},${lb})`;
      artistEl.style.color=`rgb(${ar},${ag},${ab})`;
      progFill.style.background=`rgb(${r},${g},${b})`;
    }
  }catch(_){}
}

// ── Bokeh ──────────────────────────────────────────────────────
const bkCvs=document.getElementById('bg-bokeh'),bkCtx=bkCvs.getContext('2d');
let bkOrbs=[],bkOn=false;
function initBokeh(){
  bkCvs.width=window.innerWidth;bkCvs.height=window.innerHeight;
  bkOrbs=Array.from({length:14},()=>({x:Math.random()*bkCvs.width,y:Math.random()*bkCvs.height,r:35+Math.random()*75,vx:(Math.random()-0.5)*0.22,vy:(Math.random()-0.5)*0.22,op:0.04+Math.random()*0.07}));
}
function tickBokeh(){
  if(!bkOn)return;
  const W=bkCvs.width,H=bkCvs.height,{r,g,b}=ambientRgb;
  bkCtx.clearRect(0,0,W,H);
  for(const o of bkOrbs){
    o.x=(o.x+o.vx+W)%W;o.y=(o.y+o.vy+H)%H;
    const gr=bkCtx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
    gr.addColorStop(0,`rgba(${r},${g},${b},${o.op})`);gr.addColorStop(1,`rgba(${r},${g},${b},0)`);
    bkCtx.beginPath();bkCtx.arc(o.x,o.y,o.r,0,Math.PI*2);bkCtx.fillStyle=gr;bkCtx.fill();
  }
  requestAnimationFrame(tickBokeh);
}

// ── Confetti ───────────────────────────────────────────────────
const confCvs=document.getElementById('confetti-canvas'),confCtx=confCvs.getContext('2d');
let confParticles=[],confRunning=false;
function spawnConfetti(){
  if(!settings.animations?.confetti)return;
  confCvs.width=window.innerWidth;confCvs.height=window.innerHeight;
  const {r,g,b}=ambientRgb;
  const colors=[
    `rgb(${r},${g},${b})`,
    `rgb(${Math.min(255,r+90)},${Math.min(255,g+90)},${Math.min(255,b+90)})`,
    '#ffffff','#1db954',`hsl(${(r*360/255+120)%360},65%,65%)`
  ];
  for(let i=0;i<75;i++){
    confParticles.push({
      x:(0.15+Math.random()*0.7)*confCvs.width,
      y:(0.25+Math.random()*0.5)*confCvs.height,
      vx:(Math.random()-0.5)*9,vy:-3-Math.random()*9,
      color:colors[Math.floor(Math.random()*colors.length)],
      w:3+Math.random()*7,h:2+Math.random()*5,
      rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.28,
      life:1,decay:0.007+Math.random()*0.007,
    });
  }
  if(!confRunning){confRunning=true;tickConfetti();}
}
function tickConfetti(){
  confParticles=confParticles.filter(p=>p.life>0);
  if(!confParticles.length){confRunning=false;confCtx.clearRect(0,0,confCvs.width,confCvs.height);return;}
  confCtx.clearRect(0,0,confCvs.width,confCvs.height);
  for(const p of confParticles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.22;p.rot+=p.rotV;p.life-=p.decay;
    confCtx.save();
    confCtx.globalAlpha=Math.max(0,p.life);
    confCtx.translate(p.x,p.y);confCtx.rotate(p.rot);
    confCtx.fillStyle=p.color;
    confCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    confCtx.restore();
  }
  requestAnimationFrame(tickConfetti);
}

// ── EQ ─────────────────────────────────────────────────────────
function initEQ(style){
  eqWrap.innerHTML='';
  eqWrap.dataset.style=style||'classic';
  const count=(style==='dots')?10:12;
  for(let i=0;i<count;i++){
    const bar=document.createElement('div');
    bar.className='eq-bar';
    bar.style.setProperty('--d',(0.35+Math.random()*0.55).toFixed(2)+'s');
    bar.style.setProperty('--dl','-'+(Math.random()*0.6).toFixed(2)+'s');
    eqWrap.appendChild(bar);
  }
}
function positionEQ(placement){
  if(placement==='behind-art'){
    if(eqWrap.parentElement!==artContainer) artContainer.prepend(eqWrap);
  }else if(placement==='beside'){
    if(eqWrap.parentElement!==artWrap) artWrap.appendChild(eqWrap);
  }else{
    if(eqWrap.parentElement!==card) card.appendChild(eqWrap);
  }
}

// ── Card animation manager ─────────────────────────────────────
function refreshCardAnimation(){
  const anims=[];
  if(cardAnimBorderGlow) anims.push('cardGlow 2.5s ease-in-out infinite');
  if(cardAnimBpmPulse)   anims.push('bpmPulse var(--bpm-interval,0.5s) ease-in-out infinite');
  card.style.animation=anims.join(', ');
}

// ── Idle ───────────────────────────────────────────────────────
function showIdle(style){
  if(!style||style==='hidden'){idleScreen.classList.remove('idle-show');return;}
  idleInner.className='';idleInner.innerHTML='';
  if(style==='pulse'){
    idleInner.className='idle-pulse';idleInner.textContent='♫';
  }else if(style==='notes'){
    idleInner.className='idle-notes';
    const notes=['♩','♪','♫','♬'];
    for(let i=0;i<9;i++){
      const n=document.createElement('span');n.className='idle-note';
      n.textContent=notes[i%notes.length];
      n.style.left=(8+Math.random()*84)+'%';
      n.style.top=(15+Math.random()*65)+'%';
      n.style.animationDelay=(Math.random()*3).toFixed(1)+'s';
      n.style.animationDuration=(2+Math.random()*2).toFixed(1)+'s';
      n.style.color=`hsl(${100+Math.random()*60},55%,72%)`;
      idleInner.appendChild(n);
    }
  }else if(style==='wave'){
    idleInner.className='idle-wave';
    for(let i=0;i<8;i++){
      const b=document.createElement('div');b.className='idle-wave-bar';
      b.style.animationDelay=(i*0.12).toFixed(2)+'s';
      b.style.height=(10+Math.random()*18).toFixed(0)+'px';
      idleInner.appendChild(b);
    }
  }else if(style==='disc'){
    idleInner.className='idle-disc';
  }
  idleScreen.classList.add('idle-show');
}
function hideIdle(){idleScreen.classList.remove('idle-show');}

// ── Marquee ────────────────────────────────────────────────────
function applyMarquee(wrap,span){
  span.style.animation='';span.style.transform='';
  if(!settings.marquee?.enabled){wrap.style.textOverflow='ellipsis';return;}
  wrap.style.textOverflow='clip';
  const overflow=span.scrollWidth-wrap.clientWidth;
  if(overflow<=2)return;
  const dist=overflow+20;
  const dur=Math.max(3,(span.scrollWidth/38)).toFixed(1);
  span.style.setProperty('--mq-d',`-${dist}px`);
  span.style.animation=`mqScroll ${dur}s ease-in-out infinite`;
}
function checkAllMarquees(){
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    applyMarquee(titleEl,titleSpan);
    applyMarquee(artistEl,artistSpan);
    applyMarquee(albumEl,albumSpan);
  }));
}

// ── BPM / audio features ───────────────────────────────────────
async function fetchAudioFeatures(trackId){
  if(!settings.animations?.bpmPulse)return;
  try{
    const r=await fetch(`/audio-features?track_id=${trackId}`);
    const data=await r.json();
    if(data.tempo){
      const interval=(60/data.tempo).toFixed(3)+'s';
      document.documentElement.style.setProperty('--bpm-interval',interval);
      cardAnimBpmPulse=true;
      refreshCardAnimation();
    }
  }catch(_){}
}

// ── Apply settings ─────────────────────────────────────────────
function applySettings(s){
  settings=s;
  const anim=s.animations||{},pos=s.position||{};

  // Layout
  document.body.classList.toggle("layout-split",    s.layout==="split");
  document.body.classList.toggle("layout-vertical", s.layout==="vertical");
  document.body.classList.toggle("layout-horizontal",s.layout!=="vertical"&&s.layout!=="split");

  // Art style
  ['art-vinyl','art-float','art-glow','art-reflection','art-kenburns'].forEach(c=>document.body.classList.remove(c));
  const artStyle=anim.albumArtStyle||'normal';
  if(artStyle!=='normal') document.body.classList.add('art-'+artStyle);

  // Card style
  ['card-ghost','card-outlined','card-solid'].forEach(c=>document.body.classList.remove(c));
  const cs=s.cardStyle||'frosted';
  if(cs!=='frosted') document.body.classList.add('card-'+cs);

  // Text effect
  ['text-shadow','text-glow','text-outline'].forEach(c=>document.body.classList.remove(c));
  const te=s.textEffect||'none';
  if(te!=='none') document.body.classList.add('text-'+te);

  // Colors
  const titleColor=s.title.color, artistColor=s.artist.color;
  if(!anim.autoColor){
    document.documentElement.style.setProperty('--title-color',titleColor);
    document.documentElement.style.setProperty('--artist-color',artistColor);
    document.documentElement.style.setProperty('--progress-color',s.progressBar.color);
    titleEl.style.color=titleColor;
    artistEl.style.color=artistColor;
    progFill.style.background='';
  }

  // Progress style
  ['progress-shimmer','progress-glow','progress-gradient'].forEach(c=>document.body.classList.remove(c));
  const progStyle=anim.progressStyle||'normal';
  if(progStyle!=='normal') document.body.classList.add('progress-'+progStyle);

  // Lyrics effect
  ['lyrics-wave'].forEach(c=>document.body.classList.remove(c));
  const lyEff=anim.lyricsEffect||'normal';
  if(lyEff!=='normal') document.body.classList.add('lyrics-'+lyEff);

  // Background effect
  const bgEff=anim.background||'none';
  document.getElementById('bg-gradient').style.display=bgEff==='gradient'?'':'none';
  bkCvs.style.display=bgEff==='bokeh'?'':'none';
  document.getElementById('bg-grain').style.display=bgEff==='grain'?'':'none';
  if(bgEff==='bokeh'&&!bkOn){bkOn=true;initBokeh();tickBokeh();}
  else if(bgEff!=='bokeh'){bkOn=false;}

  // Border glow
  cardAnimBorderGlow=!!(anim.borderGlow);
  if(!anim.bpmPulse){cardAnimBpmPulse=false;}
  refreshCardAnimation();

  // Position
  root.className='';
  const preset=pos.preset||'top-left';
  root.classList.add('pos-'+preset);
  if(preset==='custom'){root.style.setProperty('--cx',(pos.x??16)+'px');root.style.setProperty('--cy',(pos.y??16)+'px');}

  // Card
  card.style.setProperty('--bg-color',s.background.color);
  card.style.setProperty('--blur',s.background.blur+'px');
  card.style.setProperty('--progress-color',s.progressBar.color);
  const cardCfg=s.card||{};
  card.style.borderRadius=(cardCfg.borderRadius??16)+'px';
  card.style.maxWidth=(cardCfg.maxWidth??720)+'px';

  // Controls
  const ctrl=s.controls||{};
  document.getElementById('controls-wrap').style.display=ctrl.enabled?'':'none';
  document.documentElement.style.setProperty('--ctrl-color',ctrl.color||'#fff');
  const csz=(ctrl.size??22)+'px';
  document.querySelectorAll('.ctrl-btn svg').forEach(el=>{el.style.width=csz;el.style.height=csz;});

  applyFont(s.font||'Default');

  // Album art sizing
  artWrap.style.display=s.albumArt.enabled?'':'none';
  const sz=s.albumArt.size,rad=s.albumArt.borderRadius;
  if(s.layout==='split'){
    artContainer.style.width='';artContainer.style.height='';
    albumArt.style.width='';albumArt.style.height='';
    albumArt.style.borderRadius='';
    artReflection.style.width='';artReflection.style.height='';
  }else if(artStyle==='vinyl'){
    artContainer.style.width=sz+'px';artContainer.style.height=sz+'px';
    const lbl=Math.round(sz*0.58);
    albumArt.style.width=lbl+'px';albumArt.style.height=lbl+'px';
    artReflection.style.width=sz+'px';artReflection.style.height=sz+'px';
    artReflection.style.bottom=-Math.round(sz*0.8)+'px';
    artReflection.style.borderRadius='50%';
  }else{
    artContainer.style.width='';artContainer.style.height='';
    albumArt.style.width=sz+'px';albumArt.style.height=sz+'px';
    albumArt.style.borderRadius=rad+'px';
    artReflection.style.width=sz+'px';artReflection.style.height=sz+'px';
    artReflection.style.bottom=-Math.round(sz*0.75)+'px';
    artReflection.style.borderRadius=rad+'px';
  }

  // EQ
  const eqEnabled=s.eq?.enabled||false;
  const eqStyle=s.eq?.style||'classic';
  const eqPlacement=s.eq?.placement||'beside';
  eqWrap.classList.toggle('eq-on',eqEnabled);
  if(eqEnabled){
    if(eqWrap.dataset.style!==eqStyle||eqWrap.children.length===0) initEQ(eqStyle);
    positionEQ(eqPlacement);
    if(eqPlacement==='beside') eqWrap.style.width=sz+'px';
    else eqWrap.style.width='100%';
  }
  // EQ body classes
  ['eq-beside','eq-behind-art','eq-card-bg','eq-card-fill','eq-bottom'].forEach(c=>document.body.classList.remove(c));
  ['eq-classic','eq-led','eq-mirrored','eq-dots','eq-gradient','eq-thin'].forEach(c=>document.body.classList.remove(c));
  if(eqEnabled){
    document.body.classList.add('eq-'+(eqPlacement||'beside'));
    if(eqStyle!=='classic') document.body.classList.add('eq-'+eqStyle);
  }

  // Text elements
  titleEl.style.display=s.title.enabled?'':'none';
  titleEl.style.fontSize=s.title.fontSize+'px';
  artistEl.style.display=s.artist.enabled?'':'none';
  artistEl.style.fontSize=s.artist.fontSize+'px';
  albumEl.style.display=s.album.enabled?'':'none';
  albumEl.style.fontSize=s.album.fontSize+'px';
  albumEl.style.color=s.album.color;

  progWrap.style.display=s.progressBar.enabled?'':'none';
  lyricsWrap.style.display=s.lyrics.enabled?'':'none';
  lyricsInner.style.textAlign=s.lyrics.textAlign||'left';

  renderLyrics();
  updateVinylSpin();
  checkAllMarquees();
}

function updateVinylSpin(){
  artContainer.classList.toggle('spinning',isPlaying&&(settings.animations?.albumArtStyle==='vinyl'));
  eqWrap.classList.toggle('eq-paused',!isPlaying);
}

// ── Song change transitions ───────────────────────────────────
async function onTrackChange(data){
  if(settings.animations?.confetti) spawnConfetti();
  const t=settings.animations?.songChange||settings.animation||'slide';
  if     (t==='flip')   await doFlip(data);
  else if(t==='blur')   await doBlur(data);
  else if(t==='glitch') await doGlitch(data);
  else if(t==='slide')  await doSlide(data);
  else                  await doFade(data);
  fetchLyrics(data.title,data.artist,data.album,data.duration_ms);
  if(settings.animations?.bpmPulse) fetchAudioFeatures(data.track_id);
}

function setContent(data){
  setText(titleEl,titleSpan,data.title);
  setText(artistEl,artistSpan,data.artist);
  setText(albumEl,albumSpan,data.album);
  const url=data.album_art_url||'';
  if(albumArt.dataset.url!==url){
    albumArt.dataset.url=url;
    albumArt.crossOrigin='anonymous';
    albumArt.src=url;
    artReflection.src=url;
    albumArt.onload=()=>{
      if(settings.animations?.ambientColor||settings.animations?.autoColor) extractColor(albumArt);
      albumArt.classList.remove('popin');void albumArt.offsetWidth;albumArt.classList.add('popin');
    };
  }
  currentLyricIndex=-1;lyrics={synced:false,lines:[]};lyricsInner.innerHTML='';
}

function setText(wrap,span,text){
  span.textContent=text;span.style.animation='';span.style.transform='';
  requestAnimationFrame(()=>requestAnimationFrame(()=>applyMarquee(wrap,span)));
}

async function doFade(data){
  card.style.transition='opacity 0.3s ease';card.style.opacity='0';
  await sleep(300);setContent(data);card.style.opacity='1';
}
async function doSlide(data){
  card.style.transition='transform 0.28s ease,opacity 0.28s ease';
  card.style.transform='translateX(-22px)';card.style.opacity='0';
  await sleep(280);setContent(data);
  card.style.transition='none';card.style.transform='translateX(22px)';card.style.opacity='0';
  void card.offsetWidth;
  card.style.transition='transform 0.32s ease,opacity 0.32s ease';
  card.style.transform='';card.style.opacity='1';
}
async function doFlip(data){
  card.style.transition='transform 0.28s ease,opacity 0.18s ease';
  card.style.transform='perspective(900px) rotateY(90deg)';card.style.opacity='0.1';
  await sleep(280);setContent(data);
  card.style.transition='none';card.style.transform='perspective(900px) rotateY(-90deg)';card.style.opacity='0.1';
  void card.offsetWidth;
  card.style.transition='transform 0.32s ease,opacity 0.22s ease';
  card.style.transform='';card.style.opacity='1';
}
async function doBlur(data){
  card.style.transition='filter 0.25s ease,opacity 0.25s ease';
  card.style.filter='blur(14px)';card.style.opacity='0.1';
  await sleep(250);setContent(data);
  card.style.transition='filter 0.38s ease,opacity 0.38s ease';
  card.style.filter='';card.style.opacity='1';
}
async function doGlitch(data){
  for(let i=0;i<8;i++){
    card.style.transition='none';
    card.style.transform=`translate(${(Math.random()-0.5)*18}px,${(Math.random()-0.5)*5}px)`;
    card.style.filter=`hue-rotate(${Math.random()*360}deg) saturate(${2+Math.random()*4})`;
    card.style.opacity=i%2===0?'1':'0.3';
    await sleep(35+Math.random()*30);
  }
  card.style.transform='';card.style.filter='';card.style.opacity='0';
  await sleep(55);setContent(data);
  card.style.transition='opacity 0.18s ease';card.style.opacity='1';
}

// ── Now playing ───────────────────────────────────────────────
async function fetchNowPlaying(){
  try{
    const r=await fetch('/now-playing'),data=await r.json();
    lastPollTime=Date.now();
    if(!data.is_playing){
      hideCard();isPlaying=false;updateVinylSpin();
      showIdle(settings.idle?.style||'pulse');
      return;
    }
    hideIdle();showCard();
    isPlaying=data.is_playing;
    updatePlayPauseIcon(isPlaying);
    updateVinylSpin();
    progressMs=data.progress_ms;
    if(data.track_id!==currentTrackId){currentTrackId=data.track_id;await onTrackChange(data);}
    updateProgress(data.progress_ms,data.duration_ms);
  }catch(_){}
}
async function fetchSettings(){
  try{const r=await fetch('/settings?profile='+overlayProfile);applySettings(await r.json());}catch(_){}
}
async function fetchLyrics(title,artist,album,duration){
  try{
    const r=await fetch(`/lyrics?${new URLSearchParams({title,artist,album,duration})}`);
    lyrics=await r.json();currentLyricIndex=-1;
    lyricsInner.style.transition='none';renderLyrics();void lyricsInner.offsetWidth;lyricsInner.style.transition='';
  }catch(_){}
}

// ── Lyrics ────────────────────────────────────────────────────
function getLyricLineHeight(){return Math.ceil((settings.lyrics?.fontSize??15)*1.9);}
function renderLyrics(){
  if(!settings.lyrics?.enabled)return;
  const s=settings.lyrics,above=s.linesAbove??2,below=s.linesBelow??2;
  lyricsLineHeight=getLyricLineHeight();
  lyricsWrap.style.height=((above+1+below)*lyricsLineHeight)+'px';
  if(!lyrics.lines.length){lyricsInner.innerHTML='';return;}
  if(lyricsInner.children.length!==lyrics.lines.length){
    lyricsInner.innerHTML='';
    lyrics.lines.forEach(line=>{
      const el=document.createElement('div');el.className='lyric-line';
      el.style.height=lyricsLineHeight+'px';el.style.lineHeight=lyricsLineHeight+'px';el.style.overflow='hidden';
      el.dataset.text=line.text;el.textContent=line.text;
      lyricsInner.appendChild(el);
    });
  }
  applyLyricStyles();
}
function applyLyricStyles(){
  if(!lyricsInner.children.length)return;
  const s=settings.lyrics,above=s.linesAbove??2;
  const idx=currentLyricIndex<0?0:currentLyricIndex;
  const origin=(s.textAlign==='center')?'center center':(s.textAlign==='right')?'right center':'left center';
  lyricsInner.style.transform=`translateY(${-(idx*lyricsLineHeight)+(above*lyricsLineHeight)}px)`;
  const vs=idx-above,ve=idx+(s.linesBelow??2);
  const waveMode=document.body.classList.contains('lyrics-wave');
  Array.from(lyricsInner.children).forEach((el,i)=>{
    const dist=i-idx,inW=i>=vs&&i<=ve,isAct=dist===0;
    el.classList.toggle('active',isAct);
    el.style.fontSize=(isAct?s.fontSize*1.08:s.fontSize)+'px';
    el.style.color=isAct?s.activeColor:s.inactiveColor;
    el.style.opacity=inW?(isAct?1:Math.max(0.2,1-Math.abs(dist)*0.28)):'0';
    el.style.fontWeight=isAct?'600':'400';
    el.style.transformOrigin=origin;
    if(waveMode&&isAct&&el.dataset.text&&!el.dataset.waved){
      el.dataset.waved='1';
      el.innerHTML=el.dataset.text.split('').map((ch,j)=>ch===' '?' ':`<span class="lc" style="animation-delay:${j*0.04}s">${ch}</span>`).join('');
    }else if((!waveMode||!isAct)&&el.dataset.waved){delete el.dataset.waved;el.textContent=el.dataset.text;}
  });
}
function updateLyricLine(progressSec){
  if(!lyrics.synced||!lyrics.lines.length)return;
  let newIdx=-1;
  for(let i=lyrics.lines.length-1;i>=0;i--){if(progressSec>=lyrics.lines[i].time){newIdx=i;break;}}
  if(newIdx!==currentLyricIndex){currentLyricIndex=newIdx;applyLyricStyles();}
}

function updateProgress(pms,dms){
  if(!dms)return;
  progFill.style.width=Math.min(100,(pms/dms)*100)+'%';
  if(settings.progressBar?.showTimeRemaining){
    timeDisplay.style.display='';
    const rem=Math.max(0,dms-pms);
    const s=Math.floor(rem/1000)%60,m=Math.floor(rem/60000);
    timeDisplay.textContent=`-${m}:${s.toString().padStart(2,'0')}`;
  }else{
    timeDisplay.style.display='none';
  }
}
function tick(){
  if(isPlaying&&lastPollTime){
    const elapsed=(progressMs+Date.now()-lastPollTime);
    updateLyricLine(elapsed/1000);
    if(settings.progressBar?.showTimeRemaining&&currentTrackId){
      // update time display in real time
      const dms=settings._durationMs||0;
      if(dms){
        const rem=Math.max(0,dms-elapsed);
        const s=Math.floor(rem/1000)%60,m=Math.floor(rem/60000);
        timeDisplay.textContent=`-${m}:${s.toString().padStart(2,'0')}`;
      }
    }
  }
  requestAnimationFrame(tick);
}
function updatePlayPauseIcon(p){document.getElementById('ctrl-play-svg').style.display=p?'none':'';document.getElementById('ctrl-pause-svg').style.display=p?'':'none';}
function showCard(){card.style.display='';requestAnimationFrame(()=>card.classList.remove('card-hidden'));}
function hideCard(){card.classList.add('card-hidden');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function init(){
  await fetchSettings();
  await fetchNowPlaying();
  setInterval(fetchNowPlaying,2000);
  setInterval(fetchSettings,10000);
  requestAnimationFrame(tick);
}
init();
</script>
